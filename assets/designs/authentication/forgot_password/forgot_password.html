<style>
        body {
            background-color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .auth-card-shadow {
            box-shadow: 0px 4px 24px rgba(15, 23, 42, 0.06);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-app-bg">
<!-- Auth Background Decor -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] rounded-full bg-medical-green-soft/30 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[40%] h-[40%] rounded-full bg-accent-blue/40 blur-[120px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-[480px]">
<!-- Logo Branding -->
<div class="flex justify-center mb-8">
<div class="p-4 bg-white rounded-xl shadow-sm border border-border-subtle inline-block">
<img alt="SDA Hospital Kwadaso Logo" class="h-16 w-auto" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDRiG07kQEy36ienkOBnqEmqInWWMeN_fj44xHNLyZDNXRjsGn2buGreBi3gUeiI75b0-tWnNewhJ11RVuz7-WOMhNEU3y85cMMogdTBBKMj_1xu2w53qYdIBp7XfEeAnnqWrvnI2ixn692N21lQTikG_hIaZBqxjpF0MNwg5UcvEqOAcOpdwUVA9AqP1W-Hbax2GIihGB76TgeC-ZlkmiSxYHoPwcX08pSe6B690HptlQZp2yuLzEeTSqYH86hUspvNihTPPf9sjE"/>
</div>
</div>
<!-- Forgot Password Card -->
<div class="bg-surface-container-lowest border border-border-subtle rounded-xl auth-card-shadow p-8 md:p-10">
<header class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Reset Access</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto">
                    Enter your staff ID or email to receive recovery instructions.
                </p>
</header>
<form class="space-y-6" id="reset-form">
<!-- Input Group -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="identifier">
                        Staff Email / ID <span class="text-secondary">*</span>
</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-on-surface-variant/50 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">badge</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-white border border-border-subtle rounded-lg text-body-md font-body-md placeholder:text-outline-variant/60 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="identifier" name="identifier" placeholder="e.g. STF-2024-001 or name@sdahospital.org" required="" type="text"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center gap-2 py-3.5 px-6 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-deep-forest transition-all active:scale-[0.98] shadow-md shadow-primary/10" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-[18px]">send</span>
</button>
</form>
<!-- Secondary Actions -->
<footer class="mt-10 pt-6 border-t border-border-subtle text-center">
<a class="inline-flex items-center gap-2 text-primary font-label-md text-label-md hover:underline decoration-2 underline-offset-4 transition-all group" href="#">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                    Return to Login
                </a>
</footer>
</div>
<!-- System Status Mini-Indicator -->
<div class="mt-8 flex justify-center items-center gap-4 text-on-surface-variant/60">
<div class="flex items-center gap-1.5 px-3 py-1 bg-white/50 border border-border-subtle rounded-full backdrop-blur-sm">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
<span class="font-body-sm text-[11px] font-medium uppercase tracking-tighter">KHMS Server Online</span>
</div>
<div class="text-[11px] font-body-sm uppercase tracking-tighter">Version 4.2.0-STABLE</div>
</div>
</main>
<!-- Client-side interaction script -->
<script>
        document.getElementById('reset-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const originalContent = btn.innerHTML;
            
            // Visual feedback for interaction
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Processing...</span>
            `;

            // Mock success state
            setTimeout(() => {
                const card = document.querySelector('.auth-card-shadow');
                card.innerHTML = `
                    <div class="text-center py-4">
                        <div class="w-16 h-16 bg-medical-green-soft rounded-full flex items-center justify-center mx-auto mb-6">
                            <span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        </div>
                        <h1 class="font-headline-lg text-headline-lg text-on-surface mb-3">Email Sent</h1>
                        <p class="font-body-md text-body-md text-on-surface-variant mb-8">
                            We've sent recovery instructions to your registered contact method. Please check your inbox and spam folder.
                        </p>
                        <button onclick="window.location.reload()" class="w-full py-3 px-6 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-deep-forest transition-all">
                            Done
                        </button>
                    </div>
                `;
            }, 1500);
        });

        // Simple parallax effect for bg spots
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            document.querySelectorAll('.blur-full').forEach(spot => {
                spot.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
            });
        });
    </script>
</body></html>
