<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Medical Abstract Pattern Background */
        .medical-pattern {
            background-color: #f8f9ff;
            background-image: 
                radial-gradient(circle at 2px 2px, #e2e8f0 1px, transparent 0);
            background-size: 32px 32px;
            opacity: 0.4;
        }

        /* Clean loading animation */
        @keyframes clinical-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
        }
        
        .pulse-effect {
            animation: clinical-pulse 3s ease-in-out infinite;
        }

        .spinner-track {
            border: 3px solid #E2E8F0;
            border-top: 3px solid #004302; /* Primary Green */
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar-container {
            width: 240px;
            height: 4px;
            background: #E2E8F0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 2rem;
        }

        .progress-bar-fill {
            height: 100%;
            background: #004302;
            width: 0%;
            transition: width 4s cubic-bezier(0.1, 0.5, 0.5, 1);
        }
    </style>
</head>
<body class="bg-background text-on-surface flex items-center justify-center min-h-screen overflow-hidden selection:bg-primary-fixed">

</div>

<h1 class="font-display-lg text-display-lg text-primary mb-2 tracking-tight">
                KHMS — Kwadaso HealthLink Integrated Platform
            </h1>
<p class="font-body-lg text-on-surface-variant flex items-center justify-center gap-2 opacity-80">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1">verified_user</span>

                Synchronizing Database...
            </p>

<script>
        // Micro-interactions for loading status
        document.addEventListener('DOMContentLoaded', () => {
            const progressFill = document.getElementById('progress-fill');
            const statusText = document.getElementById('status-text');
            
            const messages = [
                "Synchronizing Database...",
                "Loading Patient Directories...",
                "Authenticating Clinical Node...",
                "Preparing Dashboard Modules...",
                "Finalizing Environment..."
            ];
            
            let messageIndex = 0;
            
            // Initial animation trigger
            setTimeout(() => {
                progressFill.style.width = '100%';
            }, 100);

            const interval = setInterval(() => {
                if (messageIndex < messages.length - 1) {
                    messageIndex++;
                    statusText.style.opacity = '0';
                    setTimeout(() => {
                        statusText.textContent = messages[messageIndex];
                        statusText.style.opacity = '1';
                    }, 300);
                } else {
                    clearInterval(interval);
                }
            }, 800);

            // Transitions of the status text
            statusText.style.transition = 'opacity 0.3s ease';
        });
    </script>
